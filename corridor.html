<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>project.docs</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- NEW FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --app-corner-radius: 0.35rem;

        --clr-amber: #2563eb;
        --clr-blue: #2565fa;
        --clr-green: #38a169;
        --clr-grey: #6b7280;

        --u2-head: #2d3748;
        --u2-border: #cbd5e0;
        --u2-bg: #fffbf0;
        --u2-tag: #fffaf0;
        --u2-action: #dd6b20;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f8fafc;
        color: #111827;
        transition: all 0.3s ease;
      }

      .main-container {
        flex-grow: 1;
        padding: 3rem 1.5rem 5rem;
      }

      /* HEADER */

      .brand-line {
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .header-link-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;

        display: flex;
        align-items: center;
        justify-content: center;

        background: rgba(245, 159, 11, 0.08);
        border: 1px solid rgba(245, 159, 11, 0.15);
      }

      .brand-text {
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: var(--clr-amber);
      }

      .brand-sub {
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--clr-grey);
        margin-top: 2px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 12px;

        border-radius: 999px;

        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.08em;

        color: var(--clr-grey);

        border: 1px solid rgba(100, 116, 139, 0.15);
        background: rgba(100, 116, 139, 0.05);
      }

      /* BANNERS */

      .banner-strip {
        background: var(--u2-head);

        color: white;

        padding: 0.9rem 1.25rem;

        border-radius: var(--app-corner-radius);

        display: flex;
        justify-content: space-between;
        align-items: center;

        margin-bottom: 1.5rem;
      }

      /* GOLDEN FEATURE */

      .border-amber {
        border: 1px solid rgba(245, 159, 11, 0.4);
      }

      .soft-tint-amber {
        background-color: #ffffff;
        background-image: linear-gradient(
          rgba(245, 159, 11, 0.05),
          rgba(245, 159, 11, 0.05)
        );
      }

      .ui-tag {
        display: inline-block;

        padding: 0.35rem 0.7rem;

        border-radius: 999px;

        font-size: 0.7rem;
        font-weight: 700;

        color: white;
      }

      .golden-card {
        border-radius: var(--app-corner-radius);

        transition:
          transform 0.35s ease,
          box-shadow 0.35s ease,
          border-color 0.35s ease;
      }
      .golden-card:hover {
        transform: translateY(-6px);

        box-shadow:
          0 18px 40px rgba(245, 159, 11, 0.12),
          0 8px 18px rgba(0, 0, 0, 0.08);

        border-color: rgba(245, 159, 11, 0.65);
      }

      .golden-title {
        font-size: clamp(2.3rem, 4vw, 4rem);
        font-weight: 800;
        letter-spacing: -0.06em;
      }

      /* LOWER SECTION */

      .bg-blueprint-card {
        border-radius: var(--app-corner-radius);
        transition: all 0.3s ease;
      }

      .bg-blueprint-card:hover {
        transform: translateY(-4px);
      }

      /* FOOTER */

      footer {
        padding-top: 4rem;
        opacity: 0.65;
        font-size: 0.8rem;
      }

      /* ========================= */
      /* DARK MODE */
      /* ========================= */

      [data-bs-theme="dark"] body {
        background: #020617;
        color: #f8fafc;
      }

      [data-bs-theme="dark"] .brand-line {
        border-bottom-color: rgba(255, 255, 255, 0.08);
      }

      [data-bs-theme="dark"] .brand-sub,
      [data-bs-theme="dark"] .text-secondary {
        color: #94a3b8 !important;
      }

      /* GOLD CARD */

      [data-bs-theme="dark"] .soft-tint-amber {
        background-color: #0f172a !important;

        background-image: linear-gradient(
          rgba(245, 159, 11, 0.08),
          rgba(245, 159, 11, 0.12)
        ) !important;

        border-color: rgba(245, 159, 11, 0.4) !important;
      }

      /* LOWER CARDS */

      [data-bs-theme="dark"] .bg-blueprint-card {
        background: #111827 !important;
        border-color: #334155 !important;
        color: #f8fafc !important;
      }

      [data-bs-theme="dark"] .bg-blueprint-card h2,
      [data-bs-theme="dark"] .bg-blueprint-card h3,
      [data-bs-theme="dark"] .bg-blueprint-card h4,
      [data-bs-theme="dark"] .bg-blueprint-card h5,
      [data-bs-theme="dark"] .bg-blueprint-card h6,
      [data-bs-theme="dark"] .bg-blueprint-card p,
      [data-bs-theme="dark"] .bg-blueprint-card span {
        color: #f8fafc !important;
      }

      [data-bs-theme="dark"] .bg-blueprint-card .border,
      [data-bs-theme="dark"] .bg-blueprint-card .rounded {
        border-color: #334155 !important;
      }

      [data-bs-theme="dark"] .progress {
        background-color: rgba(255, 255, 255, 0.08) !important;
      }

      /* RESPONSIVE */

      @media (max-width: 768px) {
        .main-container {
          padding: 2rem 1rem 4rem;
        }

        .banner-strip {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.75rem;
        }

        .golden-title {
          font-size: 2.2rem;
        }

        .header-link-icon {
          width: 42px;
          height: 42px;
        }

        .brand-text {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>

  <body>
    <main class="main-container container">
      <!-- HEADER -->

      <header
        class="d-flex justify-content-between align-items-end brand-line pb-3 mb-5"
      >
        <div class="d-flex align-items-center gap-3">
          <div class="header-link-icon">
            <i
              data-lucide="landmark"
              style="color: var(--clr-blue); width: 28px; height: 28px"
            ></i>
          </div>

          <a href="index.html" class="text-decoration-none d-flex flex-column">
            <span class="brand-text">The Corridor</span>

            <span class="brand-sub"> Euro-African SME Network </span>
          </a>
        </div>

        <div class="status-pill">V2026.01</div>
      </header>

      <!-- SECTION 1 -->

      <section class="mb-4">
        <!-- GOLDEN FEATURE -->

        <div class="soft-tint-amber border-amber golden-card p-4 p-md-5">
          <div class="row align-items-center g-4">
            <div class="col-md-8">
              <h3 class="golden-title mb-3">The Corridor</h3>

              <p class="lead" style="max-width: 680px; color: var(--clr-grey)">
                Euro-African SME Network
              </p>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2 -->

      <section class="pt-1 pb-2">
        <div class="row g-4">
          <div class="col-md-4">
            <div
              class="bg-blueprint-card h-100 p-4"
              style="
                background-color: var(--u2-tag);
                border: 1px solid var(--u2-border);
              "
            >
              <h5 class="fw-bold mb-3">Live Metrics</h5>

              <div class="d-flex justify-content-between mb-2">
                <span class="small text-secondary"> Operational Speed </span>

                <span class="small fw-bold"> 94% </span>
              </div>

              <div
                class="progress mb-4"
                style="height: 4px; background-color: rgba(0, 0, 0, 0.08)"
              >
                <div
                  class="progress-bar"
                  style="width: 94%; background-color: var(--u2-action)"
                ></div>
              </div>

              <p class="small text-secondary mb-0">
                Active sprints are currently tracking ahead of schedule.
              </p>
            </div>
          </div>

          <div class="col-md-8">
            <div
              class="bg-blueprint-card h-100 p-5"
              style="
                background-color: var(--u2-bg);
                border: 2px solid var(--u2-border);
              "
            >
              <h2 class="display-6 fw-800" style="color: var(--u2-head)">
                Concrete Results
              </h2>

              <p class="lead text-secondary mb-5">
                We build the road and drive the truck for you.
              </p>

              <div class="row g-3">
                <div class="col-sm-4">
                  <div class="p-3 border rounded">
                    <i
                      data-lucide="layers"
                      class="mb-2"
                      style="color: var(--u2-action)"
                    ></i>

                    <h6 class="fw-bold m-0">Blueprints</h6>
                  </div>
                </div>

                <div class="col-sm-4">
                  <div class="p-3 border rounded">
                    <i
                      data-lucide="zap"
                      class="mb-2"
                      style="color: var(--u2-action)"
                    ></i>

                    <h6 class="fw-bold m-0">Sprints</h6>
                  </div>
                </div>

                <div class="col-sm-4">
                  <div class="p-3 border rounded">
                    <i
                      data-lucide="shield-check"
                      class="mb-2"
                      style="color: var(--u2-action)"
                    ></i>

                    <h6 class="fw-bold m-0">Full Scale</h6>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- FOOTER -->

      <footer class="text-center">project.docs · 2026</footer>
    </main>

    <script>
      lucide.createIcons();

      const setTheme = () => {
        const isDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        document.documentElement.setAttribute(
          "data-bs-theme",
          isDark ? "dark" : "light",
        );
      };

      setTheme();

      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", setTheme);
    </script>
  </body>
</html>

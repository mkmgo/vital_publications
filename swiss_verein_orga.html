<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Corridor - Executive Operations Booklet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0f12;
      color: #f3f4f6;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
    .font-georgia {
      font-family: 'Georgia', serif;
    }
    .font-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    /* Portrait aspect ratio lock (standard 9:16 mobile vertical) */
    .portrait-slide {
      aspect-ratio: 9 / 16;
      max-width: 420px;
      width: 100%;
    }
    ::-webkit-scrollbar {
      display: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen py-6 px-4">

  <div class="w-full max-w-md flex justify-between items-center mb-4 text-[10px] tracking-widest text-zinc-500 uppercase">
    <span>OPERATIONS BOOKLET • PORTRAIT DECK</span>
    <span id="slide-counter">Slide 1 of 5</span>
  </div>

  <div class="relative portrait-slide bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl flex flex-col justify-between p-8 transition-all duration-300">
    
    <div id="slide-content" class="flex-1 flex flex-col justify-between py-4 z-10">
      </div>

    <div class="flex justify-between items-center pt-4 border-t border-zinc-800/60 z-10">
      <div class="flex space-x-1.5" id="dots-container"></div>
      <div class="flex space-x-2">
        <button id="prev-btn" onclick="prevSlide()" class="p-2.5 rounded-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors disabled:opacity-30 disabled:pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <button id="next-btn" onclick="nextSlide()" class="p-2.5 rounded-full bg-amber-500 hover:bg-amber-400 text-zinc-950 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mt-6 bg-zinc-900/60 border border-zinc-800/80 rounded-2xl p-4 text-xs text-zinc-400">
    <div class="flex items-center space-x-2 mb-2">
      <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
      <span class="font-semibold text-zinc-200">How to use this text on Google Slides:</span>
    </div>
    <p class="leading-relaxed">
      Browse using buttons or keyboard arrows. Click below to copy all clean text instantly to your clipboard.
    </p>
    <button onclick="copySlideText()" class="mt-3 w-full py-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded-lg transition-colors font-medium border border-zinc-700/50 flex items-center justify-center space-x-1">
      <span id="copy-btn-text">Copy Slide Text</span>
    </button>
  </div>

  <script>
    const slidesData = [
      {
        id: 1,
        type: "cover",
        bgImage: "https://res.cloudinary.com/dp455m4rk/image/upload/v1779304971/henrique-ferreira-6v-K4PpCHVw-unsplash_1_njgbko.jpg",
        eyebrow: "OPERATIONAL ARCHITECTURE",
        title: "The Corridor",
        subtitle: "Executive Governance & Revenue Matrix",
        body: "A comprehensive structural blueprint outlining the flow of capital, executive line management responsibilities, and corporate subcontracting mechanisms operating beneath the Swiss Verein ecosystem.",
        flagship: "<span class='font-georgia text-zinc-300/90 lowercase font-medium tracking-wide'>h·e·r collab</span> Operations",
        tagline: "High-signal structural precision.",
        accentColor: "text-amber-400",
        bgBadge: "OVERVIEW",
        signetSize: "w-14 h-14 top-6 right-6"
      },
      {
        id: 2,
        type: "diagram",
        eyebrow: "PIPELINE SCHEMATIC",
        title: "Exchange Architecture",
        subtitle: "The Euro-African SME Exchange Network Structure",
        body: "The concrete routing design demonstrating the mechanical relationship between regional small-to-medium ventures and the primary operational vehicle.",
        flagship: "Subcontracted Infrastructure Node",
        tagline: "Bilateral resource balancing across distinct economic zones.",
        accentColor: "text-orange-400",
        bgBadge: "PIPELINE",
        signetSize: "w-9 h-9 top-7 right-7"
      },
      {
        id: 3,
        type: "table",
        eyebrow: "REVENUE FLOW MATRIX",
        title: "Capital Architecture",
        subtitle: "Bilateral SME Revenue Mechanics",
        tableHeaders: ["Funding Component", "Operational Purpose"],
        tableRows: [
          ["Fixed Monthly Membership Fee", "Sustains the core infrastructure and network platform."],
          ["Voluntary Public Top-Up", "Boosts individual platform visibility and status."]
        ],
        body: "SMEs maintain the operational baseline through predictable subscriptions, while ecosystem supporters scale visibility dynamically via gamified public capital allocations.",
        flagship: "Subcontracted Execution Node",
        tagline: "Capital routes directly to h·e·r collab via legal B2B transfer.",
        accentColor: "text-emerald-400",
        bgBadge: "FINANCIALS",
        signetSize: "w-9 h-9 top-7 right-7"
      },
      {
        id: 4,
        type: "table",
        eyebrow: "ECOSYSTEM MAPPING",
        title: "Ecosystem Design",
        subtitle: "Subcontracted Value Architecture",
        tableHeaders: ["Ecosystem Domain", "Subcontracted Deliverable"],
        tableRows: [
          ["Ecosystem Design & Intel", "Platform design and localized market intelligence loops."],
          ["Programmatic Operations", "Subcontracts research, event production, and architecture."]
        ],
        body: "The Swiss Verein serves as an asset-light clearing node, outsourcing complex operational elements directly to localized operational teams.",
        flagship: "<span class='font-georgia text-zinc-300/90 lowercase font-medium tracking-wide'>h·e·r collab</span> Flagship",
        tagline: "Bypassing heavy operational drag via clean service invoicing.",
        accentColor: "text-teal-400",
        bgBadge: "DELIVERABLES",
        signetSize: "w-9 h-9 top-7 right-7"
      },
      {
        id: 5,
        type: "table",
        bgImage: "https://res.cloudinary.com/dp455m4rk/image/upload/v1779307269/ilia-bronskiy-FKHIXsgmpHc-unsplash_gvx6nd.jpg",
        eyebrow: "GOVERNANCE FRAMEWORK",
        title: "The Executive Team",
        subtitle: "Management Allocation & Signatory Lines",
        tableHeaders: ["Executive Role", "Primary Governance Mandate"],
        tableRows: [
          ["Michael Karl Mueller (Venture CFOO)", "Strategy, Risk, & Asset Control (Non-Resident)"],
          ["Chaz Pigou (CEO & Chief Marketing Officer)", "Operational Engine, Growth, & Network Lead(Non-Resident)"],
          ["Fractional Admin (Swiss Resident)", "Statutory Signatory, Bank & Local Admin"]
        ],
        body: "A strict three-way division of regulatory responsibilities ensuring deep cross-border compliance while safeguarding remote strategic asset execution.",
        flagship: "Dual Joint-Signature Framework",
        tagline: "Industrial-grade corporate protection at scale.",
        accentColor: "text-purple-400",
        bgBadge: "EXECUTIVE",
        signetSize: "w-9 h-9 top-7 right-7"
      }
    ];

    let currentSlideIndex = 0;

    function renderSlide() {
      const slide = slidesData[currentSlideIndex];
      const contentArea = document.getElementById('slide-content');
      const containerElement = contentArea.parentElement;
      
      containerElement.style.backgroundImage = 'none';
      containerElement.className = "relative portrait-slide bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl flex flex-col justify-between p-8 transition-all duration-300";

      let innerHTML = '';

      if (slide.type === "cover") {
        containerElement.style.backgroundImage = `linear-gradient(to bottom, rgba(13,15,18,0.85), rgba(13,15,18,0.98)), url('${slide.bgImage}')`;
        containerElement.style.backgroundSize = 'cover';
        containerElement.style.backgroundPosition = 'center';

        innerHTML = `
          <div class="flex flex-col justify-between h-full animate-fadeIn">
            <div>
              <div class="flex items-center justify-between pr-14">
                <span class="text-[10px] tracking-[0.25em] font-medium text-zinc-400/80 uppercase">${slide.eyebrow}</span>
                <span class="px-2 py-0.5 text-[9px] bg-zinc-950/80 rounded-full text-zinc-400 border border-zinc-800 font-mono">${slide.bgBadge}</span>
              </div>
              
              <h1 class="font-serif text-3xl font-semibold tracking-tight text-zinc-100 mt-5 leading-tight">
                ${slide.title}
              </h1>
              <p class="text-[15px] italic font-serif ${slide.accentColor} mt-1 leading-snug">
                ${slide.subtitle}
              </p>
              
              <div class="mt-6 border-l-2 border-zinc-700/60 pl-4">
                <p class="text-[15px] leading-relaxed text-zinc-200 font-light">
                  ${slide.body}
                </p>
              </div>
            </div>

            <div class="mt-auto pt-4">
              <div class="bg-zinc-950/70 backdrop-blur-sm border border-zinc-800 rounded-2xl p-4 flex items-center justify-between">
                <div>
                  <span class="block text-[9px] uppercase tracking-wider text-zinc-500 font-medium">Strategic Driver</span>
                  <span class="text-xs font-semibold text-zinc-200">${slide.flagship}</span>
                </div>
                <span class="w-1.5 h-1.5 rounded-full bg-amber-500 shadow-lg shadow-amber-500/50"></span>
              </div>
              <p class="text-[11px] text-zinc-400/70 mt-3 text-center italic">
                "${slide.tagline}"
              </p>
            </div>
          </div>
        `;
      } else if (slide.type === "diagram") {
        innerHTML = `
          <div class="flex flex-col justify-between h-full animate-fadeIn">
            <div>
              <div class="flex items-center justify-between pr-14">
                <span class="text-[10px] tracking-[0.25em] font-medium text-zinc-500 uppercase">${slide.eyebrow}</span>
                <span class="px-2 py-0.5 text-[9px] bg-zinc-950 rounded-full text-zinc-400 border border-zinc-800 font-mono">${slide.bgBadge}</span>
              </div>
              <h1 class="font-serif text-2xl font-semibold tracking-tight text-zinc-100 mt-3 leading-tight">
                ${slide.title}
              </h1>
              <p class="text-xs italic font-serif ${slide.accentColor} mt-0.5 leading-snug">
                ${slide.subtitle}
              </p>
            </div>

            <div class="my-4 flex-1 bg-zinc-950 border border-zinc-800/80 rounded-xl p-4 flex flex-col justify-center items-center overflow-hidden font-mono text-[9px] text-zinc-400 tracking-tight">
              
              <div class="w-full border border-zinc-700 bg-zinc-900/60 p-2 text-center rounded-md text-zinc-100 font-semibold shadow-sm">
                SWISS VEREIN (ASSOCIATION)<br>
                <span class="text-zinc-400 font-normal text-[8px]">"The Euro-African SME Exchange Network"</span>
              </div>

              <div class="w-full grid grid-cols-7 gap-1 my-2.5 text-center text-[8px] leading-tight text-zinc-500">
                <div class="col-span-3 flex items-center justify-end text-right">
                  Pays fixed fees &amp;<br>voluntary top-ups
                </div>
                <div class="col-span-1 flex flex-col items-center justify-center text-zinc-600">
                  <div class="h-6 w-px border-l border-zinc-600"></div>
                  <div>▼</div>
                </div>
                <div class="col-span-3 flex items-center justify-start text-left">
                  Subcontracts Ecosystem<br>Design &amp; Market Intel
                </div>
              </div>

              <div class="w-full grid grid-cols-3 gap-2">
                <div class="border border-zinc-800 bg-zinc-900/30 p-1.5 text-center rounded text-[8px] flex flex-col justify-center leading-normal">
                  <span class="text-zinc-300 font-medium">DACH Region SMEs</span>
                </div>
                <div class="border border-amber-500/40 bg-amber-500/5 p-1.5 text-center rounded text-[8px] font-semibold text-amber-400 flex flex-col justify-center leading-normal">
                  h·e·r collab<br>
                  <span class="text-[7px] font-normal text-zinc-500">(Flagship)</span>
                </div>
                <div class="border border-zinc-800 bg-zinc-900/30 p-1.5 text-center rounded text-[8px] flex flex-col justify-center leading-normal">
                  <span class="text-zinc-300 font-medium">Southern African SMEs</span>
                </div>
              </div>

            </div>

            <div>
              <p class="text-[13px] leading-relaxed text-zinc-400 font-light px-1 mb-3">
                ${slide.body}
              </p>
              <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 flex items-center justify-between">
                <span class="text-[11px] font-semibold text-zinc-300">${slide.flagship}</span>
                <span class="text-[10px] italic text-zinc-500">"${slide.tagline}"</span>
              </div>
            </div>
          </div>
        `;
      } else if (slide.type === "table") {
        // If a background image is specified for the table layout, apply transparent scrims
        if (slide.bgImage) {
          containerElement.style.backgroundImage = `linear-gradient(to bottom, rgba(13,15,18,0.88), rgba(13,15,18,0.98)), url('${slide.bgImage}')`;
          containerElement.style.backgroundSize = 'cover';
          containerElement.style.backgroundPosition = 'center';
        }

        let rowsHtml = slide.tableRows.map(row => `
          <tr class="border-b border-zinc-800/60 last:border-none">
            <td class="py-2.5 pr-2 text-xs font-medium text-zinc-200 align-top tracking-wide w-5/12 leading-tight">${row[0]}</td>
            <td class="py-2.5 pl-2 text-[11px] text-zinc-400 font-light align-top leading-normal w-7/12">${row[1]}</td>
          </tr>
        `).join('');

        innerHTML = `
          <div class="flex flex-col justify-between h-full animate-fadeIn">
            <div>
              <div class="flex items-center justify-between pr-14">
                <span class="text-[10px] tracking-[0.25em] font-medium text-zinc-500 uppercase">${slide.eyebrow}</span>
                <span class="px-2 py-0.5 text-[9px] bg-zinc-950 rounded-full text-zinc-400 border border-zinc-800 font-mono">${slide.bgBadge}</span>
              </div>
              <h1 class="font-serif text-2xl font-semibold tracking-tight text-zinc-100 mt-3 leading-tight">
                ${slide.title}
              </h1>
              <p class="text-xs italic font-serif ${slide.accentColor} mt-0.5 leading-snug">
                ${slide.subtitle}
              </p>
            </div>

            <div class="my-4 flex-1 bg-zinc-950/90 border border-zinc-800/80 rounded-xl p-3.5 flex flex-col justify-center overflow-hidden backdrop-blur-sm">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="border-b border-zinc-800">
                    <th class="pb-2 pr-2 text-[9px] font-semibold tracking-wider text-zinc-500 uppercase">${slide.tableHeaders[0]}</th>
                    <th class="pb-2 pl-2 text-[9px] font-semibold tracking-wider text-zinc-500 uppercase">${slide.tableHeaders[1]}</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-zinc-800/40">
                  ${rowsHtml}
                </tbody>
              </table>
            </div>

            <div>
              <p class="text-[13px] leading-relaxed text-zinc-400 font-light px-1 mb-3">
                ${slide.body}
              </p>
              <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-3 flex items-center justify-between">
                <span class="text-[11px] font-semibold text-zinc-300">${slide.flagship}</span>
                <span class="text-[10px] italic text-zinc-500">"${slide.tagline}"</span>
              </div>
            </div>
          </div>
        `;
      }

      // Add Swiss Signet on every slide
      innerHTML += `
        <img src="https://res.cloudinary.com/dp455m4rk/image/upload/v1779304928/IMG_0069_zln2bp.png" 
             class="absolute ${slide.signetSize} object-contain mix-blend-screen opacity-95 z-20" 
             alt="Swiss Signet Asset">
      `;

      contentArea.innerHTML = innerHTML;

      document.getElementById('slide-counter').innerText = `Slide ${slide.id} of ${slidesData.length}`;
      document.getElementById('prev-btn').disabled = currentSlideIndex === 0;
      
      const nextBtn = document.getElementById('next-btn');
      if (currentSlideIndex === slidesData.length - 1) {
        nextBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
        `;
      } else {
        nextBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        `;
      }

      renderDots();
    }

    function renderDots() {
      const dotsContainer = document.getElementById('dots-container');
      dotsContainer.innerHTML = '';
      slidesData.forEach((_, idx) => {
        const dot = document.createElement('button');
        dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${
          idx === currentSlideIndex ? 'w-5 bg-amber-500' : 'bg-zinc-700 hover:bg-zinc-500'
        }`;
        dot.onclick = () => {
          currentSlideIndex = idx;
          renderSlide();
        };
        dotsContainer.appendChild(dot);
      });
    }

    function nextSlide() {
      if (currentSlideIndex === slidesData.length - 1) {
        currentSlideIndex = 0;
      } else {
        currentSlideIndex++;
      }
      renderSlide();
    }

    function prevSlide() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        renderSlide();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        prevSlide();
      }
    });

    function copySlideText() {
      const slide = slidesData[currentSlideIndex];
      const stripHtml = (html) => {
        let tmp = document.createElement("DIV");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
      };

      const cleanTitle = stripHtml(slide.title);
      const cleanBody = stripHtml(slide.body);

      const formattedText = `
${slide.eyebrow}
------------------------------------
${cleanTitle}
${slide.subtitle}

${cleanBody}

"${slide.tagline}"
      `.trim();

      const tempTextArea = document.createElement('textarea');
      tempTextArea.value = formattedText;
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      try {
        document.execCommand('copy');
        const btnText = document.getElementById('copy-btn-text');
        btnText.innerText = "Copied Slide Text!";
        setTimeout(() => {
          btnText.innerText = "Copy Slide Text";
        }, 2000);
      } catch (err) {
        console.error('Could not copy text: ', err);
      }
      document.body.removeChild(tempTextArea);
    }

    window.onload = () => {
      renderSlide();
    };
  </script>
</body>
</html>
